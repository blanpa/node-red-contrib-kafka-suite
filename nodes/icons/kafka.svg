<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <g fill="#ffffff" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round" transform="translate(20,20)">
    <!-- Vertikale Verbindungslinie zwischen den zwei mittleren Knoten -->
    <line x1="0" y1="-4" x2="0" y2="4" stroke-width="2.5"/>

    <!-- Mittlere Knoten (oben + unten) -->
    <circle cx="0" cy="-7" r="3" fill="#ffffff"/>
    <circle cx="0" cy="7" r="3" fill="#ffffff"/>

    <!-- Verbindungslinien zu den äußeren Knoten -->
    <line x1="-2" y1="-9" x2="-7" y2="-12" stroke-width="2"/>
    <line x1="2" y1="-9" x2="7" y2="-12" stroke-width="2"/>
    <line x1="-2" y1="9" x2="-7" y2="12" stroke-width="2"/>
    <line x1="2" y1="9" x2="7" y2="12" stroke-width="2"/>

    <!-- Äußere Knoten (4 Ecken) -->
    <circle cx="-9" cy="-13" r="2.5" fill="#ffffff"/>
    <circle cx="9" cy="-13" r="2.5" fill="#ffffff"/>
    <circle cx="-9" cy="13" r="2.5" fill="#ffffff"/>
    <circle cx="9" cy="13" r="2.5" fill="#ffffff"/>
  </g>
</svg>
