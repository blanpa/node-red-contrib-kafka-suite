<script type="text/javascript">
  RED.nodes.registerType('kafka-suite-broker', {
    category: 'config',
    defaults: {
      name: { value: '' },
      brokers: { value: 'localhost:9092', required: true },
      clientId: { value: 'node-red-kafka-suite' },
      backend: { value: 'kafkajs' },
      servicePreset: { value: 'self-hosted' },
      authType: { value: 'none' },
      logLevel: { value: 'warn' },
      connectionTimeout: { value: 3000, validate: RED.validators.number() },
      requestTimeout: { value: 30000, validate: RED.validators.number() },
      maxRetryTime: { value: 30000, validate: RED.validators.number() },
      initialRetryTime: { value: 300, validate: RED.validators.number() },
      retries: { value: 5, validate: RED.validators.number() },
      sslRejectUnauthorized: { value: true }
    },
    credentials: {
      username: { type: 'text' },
      password: { type: 'password' },
      sslCa: { type: 'password' },
      sslCert: { type: 'password' },
      sslKey: { type: 'password' },
      sslPassphrase: { type: 'password' }
    },
    label: function () {
      return this.name || this.brokers || 'kafka broker';
    },
    oneditprepare: function () {
      var presets = {
        'self-hosted': { authType: 'none', brokers: '', hint: 'Standard Apache Kafka or Redpanda' },
        'confluent-cloud': { authType: 'sasl-plain', hint: 'Confluent Cloud (API Key + Secret, SASL/PLAIN + SSL)' },
        'aws-msk-iam': { authType: 'sasl-oauthbearer', hint: 'AWS MSK with IAM authentication' },
        'aws-msk-scram': { authType: 'sasl-scram-512', hint: 'AWS MSK with SCRAM-SHA-512' },
        'azure-event-hubs': { authType: 'sasl-plain', hint: 'Azure Event Hubs (Kafka protocol, port 9093)' },
        'aiven': { authType: 'ssl', hint: 'Aiven Kafka (mTLS with CA, cert, key)' },
        'redpanda': { authType: 'none', hint: 'Redpanda (Kafka-compatible)' }
      };

      function updateAuthFields() {
        var authType = $('#node-config-input-authType').val();
        $('.kafka-sasl-fields').hide();
        $('.kafka-ssl-fields').hide();
        $('.kafka-ssl-cert-fields').hide();

        if (authType === 'sasl-plain' || authType === 'sasl-scram-256' || authType === 'sasl-scram-512') {
          $('.kafka-sasl-fields').show();
          $('.kafka-ssl-fields').show();
        } else if (authType === 'sasl-oauthbearer') {
          $('.kafka-ssl-fields').show();
        } else if (authType === 'ssl') {
          $('.kafka-ssl-fields').show();
          $('.kafka-ssl-cert-fields').show();
        }
      }

      $('#node-config-input-servicePreset').on('change', function () {
        var preset = presets[$(this).val()];
        if (preset && preset.authType) {
          $('#node-config-input-authType').val(preset.authType);
        }
        $('#kafka-preset-hint').text(preset ? preset.hint : '');
        updateAuthFields();
      });

      $('#node-config-input-authType').on('change', updateAuthFields);

      // Show/hide advanced section
      $('#kafka-advanced-toggle').on('click', function (e) {
        e.preventDefault();
        $('#kafka-advanced-section').toggle();
        var icon = $(this).find('i');
        icon.toggleClass('fa-caret-right fa-caret-down');
      });

      updateAuthFields();
    }
  });
</script>

<script type="text/html" data-template-name="kafka-suite-broker">
  <div class="form-row">
    <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-config-input-name" placeholder="Name">
  </div>

  <div class="form-row">
    <label for="node-config-input-servicePreset"><i class="fa fa-cloud"></i> Service</label>
    <select id="node-config-input-servicePreset">
      <option value="self-hosted">Self-hosted Kafka</option>
      <option value="confluent-cloud">Confluent Cloud</option>
      <option value="aws-msk-iam">AWS MSK (IAM)</option>
      <option value="aws-msk-scram">AWS MSK (SCRAM)</option>
      <option value="azure-event-hubs">Azure Event Hubs</option>
      <option value="aiven">Aiven</option>
      <option value="redpanda">Redpanda</option>
    </select>
  </div>
  <div class="form-row">
    <span id="kafka-preset-hint" style="margin-left:105px;color:#aaa;font-size:0.9em;"></span>
  </div>

  <div class="form-row">
    <label for="node-config-input-brokers"><i class="fa fa-server"></i> Brokers</label>
    <input type="text" id="node-config-input-brokers" placeholder="broker1:9092,broker2:9092">
  </div>

  <div class="form-row">
    <label for="node-config-input-clientId"><i class="fa fa-id-card"></i> Client ID</label>
    <input type="text" id="node-config-input-clientId" placeholder="node-red-kafka-suite">
  </div>

  <div class="form-row">
    <label for="node-config-input-backend"><i class="fa fa-cogs"></i> Backend</label>
    <select id="node-config-input-backend">
      <option value="kafkajs">kafkajs (pure JS, recommended)</option>
      <option value="confluent">@confluentinc/kafka-javascript (native)</option>
    </select>
  </div>

  <hr>
  <div class="form-row">
    <label for="node-config-input-authType"><i class="fa fa-lock"></i> Auth</label>
    <select id="node-config-input-authType">
      <option value="none">None</option>
      <option value="sasl-plain">SASL/PLAIN</option>
      <option value="sasl-scram-256">SASL/SCRAM-SHA-256</option>
      <option value="sasl-scram-512">SASL/SCRAM-SHA-512</option>
      <option value="sasl-oauthbearer">SASL/OAUTHBEARER</option>
      <option value="ssl">SSL/TLS (mTLS)</option>
    </select>
  </div>

  <div class="kafka-sasl-fields" style="display:none;">
    <div class="form-row">
      <label for="node-config-input-username"><i class="fa fa-user"></i> Username</label>
      <input type="text" id="node-config-input-username" placeholder="Username / API Key">
    </div>
    <div class="form-row">
      <label for="node-config-input-password"><i class="fa fa-key"></i> Password</label>
      <input type="password" id="node-config-input-password" placeholder="Password / API Secret">
    </div>
  </div>

  <div class="kafka-ssl-fields" style="display:none;">
    <div class="form-row">
      <label for="node-config-input-sslRejectUnauthorized"><i class="fa fa-shield"></i> Verify SSL</label>
      <input type="checkbox" id="node-config-input-sslRejectUnauthorized" style="width:auto;">
      <span style="font-size:0.9em;color:#aaa;"> Reject unauthorized certificates</span>
    </div>
  </div>

  <div class="kafka-ssl-cert-fields" style="display:none;">
    <div class="form-row">
      <label for="node-config-input-sslCa"><i class="fa fa-certificate"></i> CA Cert</label>
      <textarea id="node-config-input-sslCa" rows="3" placeholder="-----BEGIN CERTIFICATE-----" style="width:70%;"></textarea>
    </div>
    <div class="form-row">
      <label for="node-config-input-sslCert"><i class="fa fa-certificate"></i> Client Cert</label>
      <textarea id="node-config-input-sslCert" rows="3" placeholder="-----BEGIN CERTIFICATE-----" style="width:70%;"></textarea>
    </div>
    <div class="form-row">
      <label for="node-config-input-sslKey"><i class="fa fa-key"></i> Client Key</label>
      <textarea id="node-config-input-sslKey" rows="3" placeholder="-----BEGIN PRIVATE KEY-----" style="width:70%;"></textarea>
    </div>
    <div class="form-row">
      <label for="node-config-input-sslPassphrase"><i class="fa fa-lock"></i> Passphrase</label>
      <input type="password" id="node-config-input-sslPassphrase" placeholder="Key passphrase (optional)">
    </div>
  </div>

  <hr>
  <div class="form-row">
    <a href="#" id="kafka-advanced-toggle" style="text-decoration:none;">
      <i class="fa fa-caret-right"></i> Advanced Settings
    </a>
  </div>

  <div id="kafka-advanced-section" style="display:none;">
    <div class="form-row">
      <label for="node-config-input-logLevel"><i class="fa fa-list"></i> Log Level</label>
      <select id="node-config-input-logLevel">
        <option value="nothing">Nothing</option>
        <option value="error">Error</option>
        <option value="warn">Warn</option>
        <option value="info">Info</option>
        <option value="debug">Debug</option>
      </select>
    </div>
    <div class="form-row">
      <label for="node-config-input-connectionTimeout"><i class="fa fa-clock-o"></i> Conn. Timeout</label>
      <input type="number" id="node-config-input-connectionTimeout" placeholder="3000"> ms
    </div>
    <div class="form-row">
      <label for="node-config-input-requestTimeout"><i class="fa fa-clock-o"></i> Req. Timeout</label>
      <input type="number" id="node-config-input-requestTimeout" placeholder="30000"> ms
    </div>
    <div class="form-row">
      <label for="node-config-input-retries"><i class="fa fa-repeat"></i> Retries</label>
      <input type="number" id="node-config-input-retries" placeholder="5">
    </div>
    <div class="form-row">
      <label for="node-config-input-maxRetryTime"><i class="fa fa-clock-o"></i> Max Retry</label>
      <input type="number" id="node-config-input-maxRetryTime" placeholder="30000"> ms
    </div>
    <div class="form-row">
      <label for="node-config-input-initialRetryTime"><i class="fa fa-clock-o"></i> Init Retry</label>
      <input type="number" id="node-config-input-initialRetryTime" placeholder="300"> ms
    </div>
  </div>
</script>

<script type="text/html" data-help-name="kafka-suite-broker">
  <p>Kafka broker connection configuration shared by all Kafka Suite nodes.</p>

  <h3>Service Presets</h3>
  <p>Select a managed Kafka service to auto-configure authentication settings:</p>
  <ul>
    <li><b>Self-hosted</b> - Standard Apache Kafka cluster</li>
    <li><b>Confluent Cloud</b> - SASL/PLAIN with API Key/Secret over SSL</li>
    <li><b>AWS MSK (IAM)</b> - OAUTHBEARER with AWS IAM authentication</li>
    <li><b>AWS MSK (SCRAM)</b> - SASL/SCRAM-SHA-512 over SSL</li>
    <li><b>Azure Event Hubs</b> - SASL/PLAIN over SSL (port 9093)</li>
    <li><b>Aiven</b> - Mutual TLS with CA, client cert, and client key</li>
    <li><b>Redpanda</b> - Kafka-compatible, same as self-hosted</li>
  </ul>

  <h3>Backend</h3>
  <p>Choose the underlying Kafka client library:</p>
  <ul>
    <li><b>kafkajs</b> (default) - Pure JavaScript, works everywhere, no native dependencies</li>
    <li><b>confluent</b> - Native librdkafka bindings, higher performance, requires <code>npm install @confluentinc/kafka-javascript</code></li>
  </ul>

  <h3>Authentication</h3>
  <p>Supports SASL/PLAIN, SCRAM-SHA-256/512, OAUTHBEARER, and mutual TLS (mTLS).
  Credentials are stored securely and never exported with flows.</p>
</script>
