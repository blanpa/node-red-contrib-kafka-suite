redpanda:
  data_directory: /var/lib/redpanda/data
  node_id: 0
  seed_servers: []
  rpc_server:
    address: 0.0.0.0
    port: 33145
  kafka_api:
    - address: 0.0.0.0
      port: 29092
      name: INTERNAL
    - address: 0.0.0.0
      port: 9094
      name: EXTERNAL
  kafka_api_tls:
    - name: EXTERNAL
      enabled: true
      cert_file: /etc/redpanda/certs/server.crt
      key_file: /etc/redpanda/certs/server.key
      truststore_file: /etc/redpanda/certs/ca.pem
      require_client_auth: true
  admin:
    - address: 0.0.0.0
      port: 9644
  advertised_rpc_api:
    address: aiven-sim
    port: 33145
  advertised_kafka_api:
    - address: aiven-sim
      port: 29092
      name: INTERNAL
    - address: localhost
      port: 9094
      name: EXTERNAL
  developer_mode: true
  auto_create_topics_enabled: true
rpk:
  overprovisioned: true
