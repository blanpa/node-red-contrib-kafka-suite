redpanda:
  data_directory: /var/lib/redpanda/data
  node_id: 0
  seed_servers: []
  rpc_server:
    address: 0.0.0.0
    port: 33145
  kafka_api:
    - address: 0.0.0.0
      port: 29092
      name: INTERNAL
      authentication_method: none
    - address: 0.0.0.0
      port: 9095
      name: EXTERNAL
      authentication_method: sasl
  kafka_api_tls:
    - name: EXTERNAL
      enabled: true
      cert_file: /etc/redpanda/certs/server.crt
      key_file: /etc/redpanda/certs/server.key
      truststore_file: /etc/redpanda/certs/ca.pem
      require_client_auth: false
  admin:
    - address: 0.0.0.0
      port: 9644
  advertised_rpc_api:
    address: redpanda-sasl
    port: 33145
  advertised_kafka_api:
    - address: redpanda-sasl
      port: 29092
      name: INTERNAL
    - address: localhost
      port: 9095
      name: EXTERNAL
  developer_mode: true
  auto_create_topics_enabled: true
  enable_sasl: true
  superusers:
    - admin
    - app
rpk:
  overprovisioned: true
